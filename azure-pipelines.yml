# ══════════════════════════════════════════════════════════════════════════════
#  Click & Dine - Azure DevOps CI/CD Pipeline
#  Stages: Code Quality -> Unit Tests -> Build & Push -> Deploy -> Smoke Test
#  Agent: Self-hosted (Default pool - your local machine)
# ══════════════════════════════════════════════════════════════════════════════

# Trigger: run pipeline on every push to main branch
trigger:
  branches:
    include:
      - main

# Pipeline-level variables
variables:
  acrName: 'restaurantacrbasit'
  acrLoginServer: 'restaurantacrbasit.azurecr.io'
  imageRepository: 'restaurant-app'
  resourceGroup: 'restaurant-rg'
  aksClusterName: 'restaurant-aks'
  keyVaultName: 'restaurant-kv-basit'
  azureServiceConnection: 'azure-service-connection'
  imageTag: '$(Build.BuildId)'

# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 1 - UNIT TESTS
# ══════════════════════════════════════════════════════════════════════════════
stages:
- stage: UnitTests
  displayName: 'Stage 1 - Unit Tests'
  jobs:
  - job: RunTests
    displayName: 'Run pytest'
    pool:
      name: 'Default'
    steps:

    - script: pip install -r requirements.txt
      displayName: 'Install dependencies'

    - script: pytest test_app.py -v --junitxml=test-results.xml
      displayName: 'Run unit tests'

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'test-results.xml'
        testRunTitle: 'Unit Tests'

# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 2 - CODE QUALITY AND SECURITY
# ══════════════════════════════════════════════════════════════════════════════
- stage: CodeQuality
  displayName: 'Stage 2 - Code Quality and Security'
  dependsOn: UnitTests
  jobs:
  - job: StaticAnalysis
    displayName: 'Code Quality and Security Scan'
    pool:
      name: 'Default'
    steps:

    - script: pip install -r requirements.txt
      displayName: 'Install dependencies'

    - script: flake8 app.py config.py --max-line-length=120
      displayName: 'flake8 - Static Code Analysis'

    - script: bandit -r app.py config.py -ll
      displayName: 'bandit - Security Scan'


# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 3 - BUILD AND PUSH DOCKER IMAGE
# ══════════════════════════════════════════════════════════════════════════════
- stage: BuildAndPush
  displayName: 'Stage 3 - Build and Push Docker Image'
  dependsOn: CodeQuality
  jobs:
  - job: DockerBuild
    displayName: 'Docker Build and Push to ACR'
    pool:
      name: 'Default'
    steps:

    - task: AzureCLI@2
      displayName: 'Build and Push Docker image to ACR'
      inputs:
        azureSubscription: 'azure-service-connection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(acrName)
          az acr show --name $(acrName) --query "loginServer" -o tsv
          docker build `
            -t $(acrLoginServer)/$(imageRepository):$(imageTag) `
            -f "$(Build.SourcesDirectory)/Dockerfile" `
            "$(Build.SourcesDirectory)"

          docker push $(acrLoginServer)/$(imageRepository):$(imageTag)
          docker tag $(acrLoginServer)/$(imageRepository):$(imageTag) $(acrLoginServer)/$(imageRepository):latest
          docker push $(acrLoginServer)/$(imageRepository):latest

# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 4 - DEPLOY TO AKS
# ══════════════════════════════════════════════════════════════════════════════
- stage: Deploy
  displayName: 'Stage 4 - Deploy to AKS'
  dependsOn: BuildAndPush
  jobs:
  - deployment: DeployToAKS
    displayName: 'Deploy to Azure Kubernetes Service'
    pool:
      name: 'Default'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: AzureCLI@2
            displayName: 'Get AKS credentials'
            inputs:
              azureSubscription: 'azure-service-connection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials `
                  --resource-group $(resourceGroup) `
                  --name $(aksClusterName) `
                  --overwrite-existing

          - task: AzureKeyVault@2
            displayName: 'Fetch secrets from Key Vault'
            inputs:
              azureSubscription: 'azure-service-connection'
              KeyVaultName: '$(keyVaultName)'
              SecretsFilter: 'DatabaseUrl'
              RunAsPreJob: false

          - task: AzureCLI@2
            displayName: 'Create Kubernetes secret'
            inputs:
              azureSubscription: 'azure-service-connection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials `
                  --resource-group $(resourceGroup) `
                  --name $(aksClusterName) `
                  --overwrite-existing
                kubectl create secret generic restaurant-secrets `
                  --from-literal=DATABASE_URL="$(DatabaseUrl)" `
                  --from-literal=SECRET_KEY="click-and-dine-secret-key" `
                  --dry-run=client -o yaml | kubectl apply --validate=false -f -

          - task: AzureCLI@2
            displayName: 'Deploy to AKS'
            inputs:
              azureSubscription: 'azure-service-connection'
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials `
                  --resource-group $(resourceGroup) `
                  --name $(aksClusterName) `
                  --overwrite-existing
                $content = Get-Content "$(System.DefaultWorkingDirectory)/k8s/deployment.yml" -Raw
                $content = $content -replace '\$\(Build\.BuildId\)', '$(imageTag)'
                Set-Content "$(System.DefaultWorkingDirectory)/k8s/deployment.yml" $content
                kubectl apply --validate=false -f "$(System.DefaultWorkingDirectory)/k8s/deployment.yml"
                kubectl apply --validate=false -f "$(System.DefaultWorkingDirectory)/k8s/service.yml"
                kubectl rollout status deployment/restaurant-app --timeout=600s

# ══════════════════════════════════════════════════════════════════════════════
#  STAGE 6 - MONITORING
# ══════════════════════════════════════════════════════════════════════════════
- stage: Monitoring
  displayName: 'Stage 6 - Grafana Monitoring'
  dependsOn: Deploy
  jobs:
  - job: PrintGrafana
    displayName: 'Print Grafana Dashboard URL'
    pool:
      name: 'Default'
    steps:

    - task: AzureCLI@2
      displayName: 'Get Grafana Dashboard URL'
      inputs:
        azureSubscription: 'azure-service-connection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $url = az grafana show `
            --name restaurant-grafana `
            --resource-group restaurant-rg `
            --query properties.endpoint -o tsv

          Write-Host "##[section]════════════════════════════════════════════"
          Write-Host "##[section]Grafana Dashboard: $url"
          Write-Host "##[section]════════════════════════════════════════════"